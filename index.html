<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS // BiG Command Center v3</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:        #000000;
  --deep:         #020D1A;
  --panel:        rgba(4, 12, 26, 0.92);
  --panel-border: rgba(0, 180, 216, 0.16);
  --panel-bright: rgba(0, 180, 216, 0.40);
  --cyan:         #00B4D8;
  --cyan-bright:  #00E5FF;
  --cyan-dim:     #007A9C;
  --cyan-glow:    rgba(0, 180, 216, 0.18);
  --text:         #DDE6F0;
  --text-dim:     #566A7F;
  --text-mid:     #8FA3B8;
  --green:        #00E676;
  --green-bg:     rgba(0, 230, 118, 0.10);
  --gold:         #FFB300;
  --gold-bg:      rgba(255, 179, 0, 0.10);
  --red:          #FF5252;
  --font:         -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --mono:         'SF Mono', 'Fira Code', 'Consolas', monospace;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--black);
  color: var(--text);
  font-family: var(--font);
}

body {
  display: flex;
  flex-direction: column;
}

/* ========== HEADER ========== */
.header {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(0,0,0,0.96);
  border-bottom: 1px solid var(--panel-border);
  flex-shrink: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: #fff;
}

.header-sep {
  color: var(--cyan);
  font-size: 15px;
  font-weight: 300;
  opacity: 0.7;
}

.header-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.28em;
  color: var(--text-dim);
  text-transform: uppercase;
}

.header-version {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--cyan-dim);
  padding: 2px 6px;
  border: 1px solid var(--panel-border);
  border-radius: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 22px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.15em;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: statusBlink 4s ease-in-out infinite;
}

@keyframes statusBlink {
  0%, 85%, 100% { opacity: 1; }
  92% { opacity: 0.15; }
}

.header-clock {
  color: var(--cyan);
  letter-spacing: 0.1em;
}

.header-divider {
  width: 1px;
  height: 16px;
  background: var(--panel-border);
}

/* ========== MAIN LAYOUT ========== */
.main {
  flex: 1;
  min-height: 0;
  display: flex;
}

/* ========== GLOBE COLUMN ========== */
.globe-col {
  flex: 0 0 58%;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at 50% 50%, #010C18 0%, #000000 68%);
}

#globe-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Ambient glow ring behind globe */
.globe-ambient {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 52%;
  padding-bottom: 52%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,180,216,0.08) 0%, transparent 65%);
  pointer-events: none;
  z-index: 2;
}

/* Voice rings CSS overlay */
.voice-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 3;
  display: none;
}

.voice-overlay.active { display: block; }

.voice-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  border-radius: 50%;
  border: 1px solid var(--cyan);
  transform: translate(-50%, -50%);
  opacity: 0;
}

.voice-overlay.active .vr1 {
  width: 240px; height: 240px;
  animation: vRing 2.0s ease-out infinite;
}
.voice-overlay.active .vr2 {
  width: 310px; height: 310px;
  animation: vRing 2.0s ease-out 0.65s infinite;
}
.voice-overlay.active .vr3 {
  width: 380px; height: 380px;
  animation: vRing 2.0s ease-out 1.3s infinite;
}

@keyframes vRing {
  0%   { opacity: 0.6; transform: translate(-50%, -50%) scale(0.88); }
  100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.12); }
}

/* Listening label */
.listen-label {
  position: absolute;
  top: 22px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  color: var(--cyan);
  text-transform: uppercase;
  display: none;
  z-index: 4;
}
.listen-label.active { display: block; animation: fadeUp 0.3s ease; }

/* Transcript pill */
.transcript-pill {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,180,216,0.12);
  border: 1px solid var(--panel-bright);
  border-radius: 20px;
  padding: 7px 20px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--cyan-bright);
  max-width: 78%;
  text-align: center;
  backdrop-filter: blur(10px);
  display: none;
  z-index: 4;
  letter-spacing: 0.04em;
}

/* Globe HUD */
.globe-hud {
  position: absolute;
  bottom: 18px;
  left: 20px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 4;
  pointer-events: none;
}

.globe-hud-item {
  display: flex;
  gap: 8px;
}

.globe-hud-label {
  color: var(--text-dim);
  opacity: 0.6;
}

.globe-hud-val {
  color: var(--cyan-dim);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateX(-50%) translateY(4px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ========== RIGHT COLUMN ========== */
.right-col {
  flex: 0 0 42%;
  display: flex;
  flex-direction: column;
  background: rgba(1, 6, 14, 0.97);
  border-left: 1px solid var(--panel-border);
  min-height: 0;
}

/* ========== CHAT PANEL ========== */
.chat-header {
  padding: 11px 20px;
  border-bottom: 1px solid var(--panel-border);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
}

.chat-header-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--cyan);
  opacity: 0.7;
}

.chat-messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 13px;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,180,216,0.15) transparent;
}

.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(0,180,216,0.2); border-radius: 2px; }

.msg {
  display: flex;
  flex-direction: column;
  gap: 4px;
  animation: msgAppear 0.28s ease;
}

@keyframes msgAppear {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-meta {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.18em;
  color: var(--text-dim);
  text-transform: uppercase;
}

.msg.user .msg-meta { color: var(--cyan-dim); text-align: right; }

.msg-bubble {
  padding: 10px 14px;
  font-size: 12.5px;
  line-height: 1.65;
  border-radius: 2px;
}

.msg.user .msg-bubble {
  background: rgba(0, 180, 216, 0.08);
  border: 1px solid rgba(0, 180, 216, 0.18);
  color: var(--text);
  align-self: flex-end;
  max-width: 88%;
}

.msg.system .msg-bubble {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.05);
  color: var(--text);
}

.msg.system .msg-bubble strong {
  color: var(--cyan-bright);
  font-weight: 600;
}

.msg.system .msg-bubble code {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  background: rgba(255,255,255,0.05);
  padding: 1px 5px;
  border-radius: 2px;
}

/* Inline tags */
.tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  vertical-align: middle;
}
.tag.complete { background: var(--green-bg); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
.tag.active   { background: var(--cyan-glow); color: var(--cyan-bright); border: 1px solid var(--panel-border); }
.tag.ready    { background: rgba(86,106,127,0.12); color: var(--text-dim); border: 1px solid rgba(86,106,127,0.2); }
.tag.new      { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(255,179,0,0.25); }

/* Status tables */
.st {
  width: 100%;
  border-collapse: collapse;
  font-size: 11.5px;
  font-family: var(--mono);
  margin-top: 8px;
}
.st th {
  font-size: 8px;
  letter-spacing: 0.18em;
  color: var(--text-dim);
  text-transform: uppercase;
  padding: 0 10px 7px 0;
  text-align: left;
  font-weight: 400;
}
.st td {
  padding: 4px 10px 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  vertical-align: middle;
}
.st tr:last-child td { border-bottom: none; }
.st td:first-child { color: var(--cyan); }

/* Typing indicator */
.typing-indicator .msg-bubble {
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
}

.typing-dots span {
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--cyan-dim);
  margin: 0 2px;
  animation: typingDot 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ========== INPUT AREA ========== */
.input-area {
  border-top: 1px solid var(--panel-border);
  padding: 12px 14px;
  display: flex;
  gap: 9px;
  align-items: center;
  flex-shrink: 0;
  background: rgba(0,0,0,0.4);
}

.text-input {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 13px;
  border-radius: 2px;
  outline: none;
  letter-spacing: 0.03em;
  transition: border-color 0.2s;
}

.text-input:focus {
  border-color: var(--cyan-dim);
}

.text-input::placeholder {
  color: var(--text-dim);
  opacity: 0.7;
}

.mic-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0,180,216,0.07);
  border: 1px solid var(--panel-border);
  color: var(--cyan);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.mic-btn:hover {
  background: rgba(0,180,216,0.16);
  border-color: var(--cyan-dim);
}

.mic-btn.recording {
  background: rgba(255,82,82,0.12);
  border-color: var(--red);
  color: var(--red);
  animation: micPulse 1.4s ease-in-out infinite;
}

.mic-btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
}

@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,82,82,0.3); }
  50%       { box-shadow: 0 0 0 8px rgba(255,82,82,0); }
}

.send-btn {
  padding: 8px 16px;
  background: rgba(0,180,216,0.10);
  border: 1px solid var(--panel-bright);
  color: var(--cyan);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  flex-shrink: 0;
  text-transform: uppercase;
}

.send-btn:hover {
  background: rgba(0,180,216,0.20);
  color: var(--cyan-bright);
}

/* ========== DATA STRIP ========== */
.data-strip {
  height: 158px;
  border-top: 1px solid var(--panel-border);
  display: flex;
  flex-shrink: 0;
  background: rgba(0, 2, 8, 0.99);
}

.data-sec {
  padding: 11px 14px;
  border-right: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  gap: 7px;
  overflow: hidden;
}

.data-sec:last-child { border-right: none; }

.sec-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  flex-shrink: 0;
}

/* Agents */
.agents-sec { flex: 0 0 56%; }

.agents-row {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  flex: 1;
  align-items: flex-start;
  scrollbar-width: none;
  padding-bottom: 2px;
}

.agents-row::-webkit-scrollbar { display: none; }

.agent-card {
  flex-shrink: 0;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 2px;
  padding: 7px 11px;
  min-width: 86px;
  cursor: default;
  transition: border-color 0.2s, background 0.2s;
}

.agent-card:hover {
  background: rgba(0,180,216,0.05);
  border-color: var(--panel-border);
}

.agent-card.s-complete { border-color: rgba(0,230,118,0.18); }
.agent-card.s-active {
  border-color: rgba(0,229,255,0.3);
  background: rgba(0,180,216,0.06);
}

.agent-name {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text);
  margin-bottom: 2px;
}

.agent-role {
  font-size: 8.5px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 110px;
}

.agent-stat {
  margin-top: 5px;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.s-ready    .agent-stat { color: var(--text-dim); }
.s-complete .agent-stat { color: var(--green); }
.s-active   .agent-stat { color: var(--cyan-bright); }

/* Project */
.project-sec { flex: 0 0 22%; }

.project-block {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 2px;
  padding: 9px 11px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.proj-name {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.08em;
}

.proj-client {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--cyan-dim);
  letter-spacing: 0.1em;
  margin-top: 2px;
}

.stage-bar {
  display: flex;
  gap: 3px;
  margin-top: 10px;
}

.stage-pip {
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.07);
  position: relative;
}

.stage-pip.done { background: var(--green); }
.stage-pip.now  { background: var(--cyan); }

.proj-stage {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text-dim);
  margin-top: 5px;
  letter-spacing: 0.08em;
}

/* Pipeline */
.pipeline-sec { flex: 0 0 22%; }

.pipe-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.pipe-item:last-child { border-bottom: none; }

.pipe-brand {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  letter-spacing: 0.04em;
}

.pipe-signal {
  font-size: 8.5px;
  color: var(--text-dim);
  margin-top: 1px;
}

.pipe-score {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--cyan);
  flex-shrink: 0;
  margin-left: 8px;
}

.new-badge {
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 0.1em;
  background: var(--gold-bg);
  color: var(--gold);
  border: 1px solid rgba(255,179,0,0.25);
  padding: 1px 4px;
  border-radius: 2px;
  margin-left: 4px;
  vertical-align: middle;
}

/* Voice not supported */
.voice-notice {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}
</style>
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="header">
  <div class="header-left">
    <span class="logo">BiG</span>
    <span class="header-sep">//</span>
    <span class="header-title">JARVIS Command Center</span>
    <span class="header-version">v3</span>
  </div>
  <div class="header-right">
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span>SYSTEM ACTIVE</span>
    </div>
    <div class="header-divider"></div>
    <span class="header-clock" id="clock">--:--:--</span>
  </div>
</header>

<!-- ========== MAIN ========== -->
<div class="main">

  <!-- GLOBE -->
  <div class="globe-col" id="globe-container">
    <canvas id="globe-canvas"></canvas>
    <div class="globe-ambient"></div>
    <div class="voice-overlay" id="voice-overlay">
      <div class="voice-ring vr1"></div>
      <div class="voice-ring vr2"></div>
      <div class="voice-ring vr3"></div>
    </div>
    <div class="listen-label" id="listen-label">Listening</div>
    <div class="transcript-pill" id="transcript-pill"></div>
    <div class="globe-hud">
      <div class="globe-hud-item">
        <span class="globe-hud-label">LAT</span>
        <span class="globe-hud-val" id="hud-lat">40.71° N</span>
      </div>
      <div class="globe-hud-item">
        <span class="globe-hud-label">LON</span>
        <span class="globe-hud-val" id="hud-lon">74.00° W</span>
      </div>
      <div class="globe-hud-item">
        <span class="globe-hud-label">NODE</span>
        <span class="globe-hud-val" id="hud-node">BiG-NYC-01</span>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-col">
    <div class="chat-header">
      <div class="chat-header-dot"></div>
      <span>Command Interface</span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="input-area">
      <input type="text" class="text-input" id="text-input"
             placeholder="Command or query..." autocomplete="off" />
      <button class="mic-btn" id="mic-btn" title="Voice input">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <button class="send-btn" id="send-btn">Send</button>
    </div>
  </div>

</div>

<!-- ========== DATA STRIP ========== -->
<div class="data-strip">

  <div class="data-sec agents-sec">
    <div class="sec-label">Agent Roster</div>
    <div class="agents-row" id="agents-row"></div>
  </div>

  <div class="data-sec project-sec">
    <div class="sec-label">Active Project</div>
    <div class="project-block">
      <div>
        <div class="proj-name">MAKE IT</div>
        <div class="proj-client">SHARPIE // NEWELL BRANDS</div>
      </div>
      <div>
        <div class="stage-bar">
          <div class="stage-pip done" title="SCOUT"></div>
          <div class="stage-pip done" title="MAESTRO"></div>
          <div class="stage-pip done" title="PARK"></div>
          <div class="stage-pip done" title="NOLAN"></div>

let hudPhase = 0;
function updateHUD() {
  hudPhase += 0.009;

  const lon  = (Math.cos(hudPhase * 0.5)  * 74).toFixed(2);
  const latDir = lat >= 0 ? 'N' : 'S';

  document.getElementById('hud-lat').textContent = Math.abs(lat) + '\u00b0 ' + latDir;

var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
var listening = false;

var micBtn         = document.getElementById('mic-btn');
var voiceOverlay   = document.getElementById('voice-overlay');
var listenLabel    = document.getElementById('listen-label');
var transcriptPill = document.getElementById('transcript-pill');

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = function(event) {
    var interim = '', final = '';
    for (var i = event.resultIndex; i < event.results.length; i++) {
      var txt = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += txt;
      else interim += txt;
    }
    var display = final || interim;
    if (display) {
      transcriptPill.textContent = display;
      transcriptPill.style.display = 'block';
    }
    if (final) {
      stopListening();
      var captured = final;
      setTimeout(function() {
        transcriptPill.style.display = 'none';
        document.getElementById('text-input').value = captured;
        handleSend();
      }, 500);
    }
  };

  recognition.onend = function() {
    if (listening) stopListening();
  };

  recognition.onerror = function(e) {
    stopListening();
    if (e.error !== 'no-speech') {
      addMsg('system', 'Voice error: ' + esc(e.error) + '. Use text input instead.');
    }
  };

  micBtn.addEventListener('click', function() {
    if (listening) {
      recognition.stop();
      stopListening();
    } else {
      startListening();
    }
  });
} else {
  micBtn.disabled = true;
  micBtn.title = 'Voice input requires Chrome or Safari';
}

function startListening() {
  listening = true;
  micBtn.classList.add('recording');
  voiceOverlay.classList.add('active');
  listenLabel.classList.add('active');
  transcriptPill.style.display = 'none';
  setGlobeSpeaking(true);
  try { recognition.start(); } catch(e) { stopListening(); }
}

function stopListening() {
  listening = false;
  micBtn.classList.remove('recording');
  voiceOverlay.classList.remove('active');
  listenLabel.classList.remove('active');
  setGlobeSpeaking(false);
}

// ============================================================
// THREE.JS GLOBE
// ============================================================

(function() {

  var container = document.getElementById('globe-container');
  var canvas    = document.getElementById('globe-canvas');

  function dims() {
    return { w: container.clientWidth, h: container.clientHeight };
  }

  var d = dims();
  var scene    = new THREE.Scene();
  var camera   = new THREE.PerspectiveCamera(42, d.w / d.h, 0.1, 100);
  camera.position.z = 2.85;

  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setSize(d.w, d.h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  // --- Inner sphere (dark fill) ---
  var innerMat = new THREE.MeshBasicMaterial({
    color: 0x000D1A,
    transparent: true,
    opacity: 0.93
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(0.968, 40, 30), innerMat));

  // --- Primary wireframe ---
  var wireMat = new THREE.LineBasicMaterial({
    color: 0x00B4D8,
    transparent: true,
    opacity: 0.28,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  var globeWire = new THREE.LineSegments(
    new THREE.WireframeGeometry(new THREE.SphereGeometry(1.0, 28, 20)),
    wireMat
  );
  scene.add(globeWire);

  // --- Secondary wireframe (counter-rotating, creates depth) ---
  var wireMat2 = new THREE.LineBasicMaterial({
    color: 0x00E5FF,
    transparent: true,
    opacity: 0.09,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  var globeWire2 = new THREE.LineSegments(
    new THREE.WireframeGeometry(new THREE.SphereGeometry(1.0, 16, 12)),
    wireMat2
  );
  scene.add(globeWire2);

  // --- Surface dots (Fibonacci sphere distribution) ---
  var dotCount = 320;
  var dotPos = new Float32Array(dotCount * 3);
  for (var i = 0; i < dotCount; i++) {
    var phi   = Math.acos(1 - 2 * (i + 0.5) / dotCount);
    var theta = Math.PI * (1 + Math.sqrt(5)) * i;
    dotPos[i*3]   = Math.sin(phi) * Math.cos(theta);
    dotPos[i*3+1] = Math.cos(phi);
    dotPos[i*3+2] = Math.sin(phi) * Math.sin(theta);
  }
  var dotGeo = new THREE.BufferGeometry();
  dotGeo.setAttribute('position', new THREE.BufferAttribute(dotPos, 3));
  var dotMat = new THREE.PointsMaterial({
    color: 0x00E5FF,
    size: 0.019,
    transparent: true,
    opacity: 0.60,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  var dots = new THREE.Points(dotGeo, dotMat);
  scene.add(dots);

  // --- Particle cloud ---
  var pCount = 1600;
  var pPos = new Float32Array(pCount * 3);
  for (var j = 0; j < pCount; j++) {
    var pr   = 1.45 + Math.random() * 1.15;
    var pphi = Math.acos(2 * Math.random() - 1);
    var pthe = Math.random() * Math.PI * 2;
    pPos[j*3]   = pr * Math.sin(pphi) * Math.cos(pthe);
    pPos[j*3+1] = pr * Math.cos(pphi);
    pPos[j*3+2] = pr * Math.sin(pphi) * Math.sin(pthe);
  }
  var pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  var pMat = new THREE.PointsMaterial({
    color: 0x00B4D8,
    size: 0.013,
    transparent: true,
    opacity: 0.38,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  var particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  // --- Equatorial ring ---
  var ringMat = new THREE.MeshBasicMaterial({
    color: 0x00B4D8,
    transparent: true,
    opacity: 0.48,
    blending: THREE.AdditiveBlending
  });
  var ring = new THREE.Mesh(new THREE.TorusGeometry(1.19, 0.004, 6, 100), ringMat);
  ring.rotation.x = Math.PI / 2;
  scene.add(ring);

  // --- Secondary tilted ring ---
  var ring2Mat = new THREE.MeshBasicMaterial({
    color: 0x0096C7,
    transparent: true,
    opacity: 0.28,
    blending: THREE.AdditiveBlending
  });
  var ring2 = new THREE.Mesh(new THREE.TorusGeometry(1.24, 0.003, 6, 100), ring2Mat);
  ring2.rotation.x = Math.PI / 4;
  ring2.rotation.z = Math.PI / 6;
  scene.add(ring2);

  // --- Arc system ---
  var arcs = [];

  function randSurface() {
    var phi = Math.acos(2 * Math.random() - 1);
    var the = Math.random() * Math.PI * 2;
    return new THREE.Vector3(
      Math.sin(phi) * Math.cos(the),
      Math.cos(phi),
      Math.sin(phi) * Math.sin(the)
    );
  }

  function spawnArc() {
    var p1  = randSurface();
    var p2  = randSurface();
    var mid = p1.clone().add(p2).multiplyScalar(0.5).normalize().multiplyScalar(1.38);
    var pts = new THREE.QuadraticBezierCurve3(p1, mid, p2).getPoints(55);
    var ag  = new THREE.BufferGeometry().setFromPoints(pts);
    var am  = new THREE.LineBasicMaterial({
      color: 0x00E5FF,
      transparent: true,
      opacity: 0.72,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    var al = new THREE.Line(ag, am);
    scene.add(al);
    arcs.push({ line: al, geo: ag, mat: am, life: 1.0 });
  }

  // --- Pulse rings ---
  var pulseRings = [];

  window.triggerGlobePulse = function() {
    var pg = new THREE.TorusGeometry(1.0, 0.007, 6, 60);
    var pm = new THREE.MeshBasicMaterial({
      color: 0x00E5FF,
      transparent: true,
      opacity: 0.65,
      blending: THREE.AdditiveBlending
    });
    var pt = new THREE.Mesh(pg, pm);
    pt.rotation.x = Math.random() * Math.PI;
    pt.rotation.y = Math.random() * Math.PI;
    scene.add(pt);
    pulseRings.push({ mesh: pt, mat: pm, sc: 1.0, op: 0.65 });
  };

  // --- State ---
  var globeSpeaking = false;
  var speakI = 0.0;
  var lastArcT = 0;

  window.setGlobeSpeaking = function(val) { globeSpeaking = val; };

  var clock = new THREE.Clock();

  // --- Animate ---
  function animate() {
    requestAnimationFrame(animate);
    var t = clock.getElapsedTime();

    // Lerp speak intensity
    var target = globeSpeaking ? 1.0 : 0.0;
    speakI += (target - speakI) * 0.08;

    var baseRot = 0.0028;
    var extraRot = speakI * 0.011;

    globeWire.rotation.y  += baseRot + extraRot;
    globeWire2.rotation.y -= baseRot * 0.65 + extraRot * 0.4;
    globeWire2.rotation.x += 0.0009;
    dots.rotation.y       += baseRot * 0.76;
    particles.rotation.y  += 0.0009;
    particles.rotation.x  += 0.0003;
    ring.rotation.z       += 0.0018 + speakI * 0.007;
    ring2.rotation.y      += 0.0025;

    // Opacity modulation
    wireMat.opacity  = 0.26 + Math.sin(t * 1.1) * 0.04 + speakI * (0.22 + Math.sin(t * 8) * 0.12);
    wireMat2.opacity = 0.08 + speakI * 0.14;
    dotMat.opacity   = 0.52 + speakI * 0.28 + Math.sin(t * 2) * 0.04;
    pMat.opacity     = 0.32 + speakI * 0.18;
    ringMat.opacity  = 0.42 + speakI * 0.28 + Math.sin(t * 1.4) * 0.06;

    // Scale breathe + speak pulse
    var bScale = 1 + Math.sin(t * 0.75) * 0.007;
    var sScale = (speakI > 0.05) ? (1 + Math.sin(t * 11) * 0.018 * speakI) : 1;
    var sc = bScale * sScale;
    globeWire.scale.setScalar(sc);
    dots.scale.setScalar(sc * 0.998);

    // Arc spawning
    var arcInterval = globeSpeaking ? 0.75 : 4.5;
    if (t - lastArcT > arcInterval) {
      spawnArc();
      lastArcT = t;
    }

    // Decay arcs
    for (var i = arcs.length - 1; i >= 0; i--) {
      arcs[i].life -= 0.015;
      arcs[i].mat.opacity = Math.max(0, arcs[i].life * 0.72);
      if (arcs[i].life <= 0) {
        scene.remove(arcs[i].line);
        arcs[i].geo.dispose();
        arcs[i].mat.dispose();
        arcs.splice(i, 1);
      }
    }

    // Decay pulse rings
    for (var k = pulseRings.length - 1; k >= 0; k--) {
      pulseRings[k].sc += 0.033;
      pulseRings[k].op -= 0.028;
      pulseRings[k].mesh.scale.setScalar(pulseRings[k].sc);
      pulseRings[k].mat.opacity = Math.max(0, pulseRings[k].op);
      if (pulseRings[k].op <= 0) {
        scene.remove(pulseRings[k].mesh);
        pulseRings[k].mesh.geometry.dispose();
        pulseRings[k].mat.dispose();
        pulseRings.splice(k, 1);
      }
    }

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', function() {
    var nd = dims();
    camera.aspect = nd.w / nd.h;
    camera.updateProjectionMatrix();
    renderer.setSize(nd.w, nd.h);
  });

})();

renderAgents();
renderPipeline();
