<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #060B14;
            --panel: rgba(8,16,32,0.92);
            --border: rgba(0,180,216,0.12);
            --border-hover: rgba(0,180,216,0.35);
            --accent: #00B4D8;
            --accent-dim: rgba(0,180,216,0.6);
            --text: #d4d4d4;
            --text-bright: #fff;
            --text-dim: #777;
            --green: #4CAF50;
            --amber: #FFC107;
            --red: #FF5252;
            --blue: #2196F3;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 12px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ─── HEADER ─── */
        .header {
            height: 46px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            flex-shrink: 0;
            z-index: 10;
        }
        .header-brand { display:flex; align-items:baseline; gap:8px; }
        .header-brand h1 { font-size:16px; font-weight:700; color:var(--accent); letter-spacing:1.5px; }
        .header-brand span { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
        .header-center { flex:1; text-align:center; }
        .header-time { font-family:'SF Mono','Monaco','Courier New',monospace; font-size:12px; color:var(--accent-dim); }
        .header-right { display:flex; align-items:center; gap:12px; }
        .header-stat { text-align:center; padding:0 10px; border-left:1px solid var(--border); }
        .header-stat .val { font-size:14px; font-weight:700; color:var(--text-bright); }
        .header-stat .lbl { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.3px; }

        /* ─── MAIN GRID ─── */
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            grid-template-rows: 1fr;
            gap: 1px;
            background: rgba(0,180,216,0.06);
            overflow: hidden;
        }

        /* ─── PANELS ─── */
        .panel {
            background: var(--panel);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-head {
            padding: 10px 14px;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .panel-head .count { color: var(--text-dim); font-weight:400; }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }
        .panel-body::-webkit-scrollbar { width:4px; }
        .panel-body::-webkit-scrollbar-track { background:transparent; }
        .panel-body::-webkit-scrollbar-thumb { background:rgba(0,180,216,0.2); border-radius:2px; }

        /* ─── LEFT COLUMN ─── */
        .left-col {
            display: flex;
            flex-direction: column;
        }

        /* Globe Section */
        .globe-wrap {
            height: 240px;
            position: relative;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            overflow: hidden;
        }
        #globe-canvas { width:100%; height:100%; display:block; }
        .globe-label {
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Agent List */
        .agent-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-bottom: 1px solid rgba(0,180,216,0.04);
            cursor: pointer;
            transition: background 0.15s;
        }
        .agent-item:hover { background: rgba(0,180,216,0.06); }
        .agent-item.selected { background: rgba(0,180,216,0.1); border-left: 2px solid var(--accent); }
        .agent-dot {
            width: 7px; height: 7px; border-radius: 50%; flex-shrink:0;
        }
        .agent-dot.active { background:var(--green); box-shadow:0 0 6px rgba(76,175,80,0.7); }
        .agent-dot.idle { background:#444; }
        .agent-dot.busy { background:var(--amber); box-shadow:0 0 6px rgba(255,193,7,0.5); }
        .agent-info { flex:1; min-width:0; }
        .agent-info .name { font-weight:600; color:var(--text-bright); font-size:11px; }
        .agent-info .role { font-size:9px; color:var(--text-dim); }
        .agent-tasks { font-size:10px; color:var(--text-dim); font-family:'SF Mono',monospace; }

        /* ─── CENTER COLUMN ─── */
        .center-col {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Project Cards Row */
        .projects-bar {
            display: flex;
            gap: 1px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            background: rgba(0,180,216,0.04);
        }
        .proj-card {
            flex: 1;
            padding: 12px 14px;
            cursor: pointer;
            transition: background 0.15s;
            border-right: 1px solid var(--border);
            position: relative;
        }
        .proj-card:last-child { border-right:none; }
        .proj-card:hover { background: rgba(0,180,216,0.06); }
        .proj-card.selected { background:rgba(0,180,216,0.1); }
        .proj-card.selected::after {
            content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--accent);
        }
        .proj-card .proj-status-dot {
            display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; vertical-align:middle;
        }
        .proj-card .proj-name { font-weight:600; color:var(--text-bright); font-size:12px; margin-bottom:3px; }
        .proj-card .proj-desc { font-size:10px; color:var(--text-dim); line-height:1.3; }
        .proj-card .proj-date { font-size:9px; color:#555; font-family:monospace; margin-top:4px; }

        /* Detail Area */
        .detail-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab {
            padding: 8px 16px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .tab-content::-webkit-scrollbar { width:4px; }
        .tab-content::-webkit-scrollbar-thumb { background:rgba(0,180,216,0.2); border-radius:2px; }
        .tab-pane { display:none; }
        .tab-pane.active { display:block; }

        /* Activity Feed */
        .feed-item {
            display: flex;
            gap: 10px;
            padding: 8px 10px;
            border-left: 2px solid var(--border);
            margin-bottom: 6px;
            transition: border-color 0.15s;
            cursor: pointer;
        }
        .feed-item:hover { border-left-color: var(--accent); background:rgba(0,180,216,0.03); }
        .feed-agent { font-size:9px; font-weight:600; color:var(--accent); text-transform:uppercase; min-width:60px; flex-shrink:0; }
        .feed-text { flex:1; color:var(--text); font-size:11px; line-height:1.4; }
        .feed-time { font-size:9px; color:#555; font-family:monospace; flex-shrink:0; white-space:nowrap; }

        /* Files List */
        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .file-item:hover { background:rgba(0,180,216,0.06); }
        .file-icon { font-size:14px; flex-shrink:0; }
        .file-name { flex:1; font-size:11px; color:var(--text-bright); }
        .file-date { font-size:9px; color:#555; font-family:monospace; }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .metric-card {
            background: rgba(0,180,216,0.04);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 10px;
            text-align: center;
        }
        .metric-card .metric-val { font-size:20px; font-weight:700; color:var(--text-bright); }
        .metric-card .metric-lbl { font-size:9px; color:var(--text-dim); text-transform:uppercase; margin-top:2px; }

        /* ─── RIGHT COLUMN ─── */
        .right-col {
            display: flex;
            flex-direction: column;
        }

        /* Pipeline */
        .pipeline-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(0,180,216,0.04);
            cursor: pointer;
            transition: background 0.15s;
        }
        .pipeline-item:hover { background:rgba(0,180,216,0.06); }
        .pipeline-info { flex:1; min-width:0; }
        .pipeline-info .name { font-weight:600; color:var(--text-bright); font-size:11px; }
        .pipeline-info .detail { font-size:9px; color:var(--text-dim); margin-top:1px; }
        .badge {
            font-size:8px; font-weight:600; text-transform:uppercase; padding:2px 6px;
            border-radius:2px; white-space:nowrap;
        }
        .badge-hot { background:rgba(76,175,80,0.2); color:var(--green); border:1px solid rgba(76,175,80,0.3); }
        .badge-warm { background:rgba(255,193,7,0.2); color:var(--amber); border:1px solid rgba(255,193,7,0.3); }
        .badge-cold { background:rgba(33,150,243,0.15); color:var(--blue); border:1px solid rgba(33,150,243,0.3); }
        .badge-overdue { background:rgba(255,82,82,0.2); color:var(--red); border:1px solid rgba(255,82,82,0.3); }

        /* Scheduled Tasks */
        .sched-item {
            display: flex; align-items:center; gap:8px; padding:7px 10px;
            border-bottom:1px solid rgba(0,180,216,0.04); cursor:pointer; transition:background 0.15s;
        }
        .sched-item:hover { background:rgba(0,180,216,0.06); }
        .sched-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
        .sched-dot.on { background:var(--green); box-shadow:0 0 5px rgba(76,175,80,0.6); }
        .sched-dot.off { background:#555; }
        .sched-info { flex:1; }
        .sched-info .name { font-size:10px; font-weight:600; color:var(--text); }
        .sched-info .cron { font-size:9px; color:#555; font-family:monospace; }

        /* ─── MODAL ─── */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100;
            display:none; align-items:center; justify-content:center;
        }
        .modal-overlay.open { display:flex; }
        .modal {
            background:var(--bg); border:1px solid var(--border); border-radius:6px;
            width:600px; max-height:80vh; display:flex; flex-direction:column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-head {
            padding:14px 18px; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
        }
        .modal-head h2 { font-size:14px; color:var(--accent); font-weight:600; }
        .modal-close { background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer; }
        .modal-close:hover { color:var(--text-bright); }
        .modal-body { padding:18px; overflow-y:auto; flex:1; line-height:1.6; font-size:12px; }
        .modal-body h3 { font-size:12px; color:var(--accent); margin:12px 0 6px; text-transform:uppercase; letter-spacing:0.4px; }
        .modal-body .kv { display:flex; gap:10px; margin-bottom:4px; }
        .modal-body .kv .k { color:var(--text-dim); min-width:100px; }
        .modal-body .kv .v { color:var(--text-bright); }
        .modal-body .tag-row { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
        .modal-body .tag { font-size:9px; padding:2px 6px; background:rgba(0,180,216,0.1); border:1px solid var(--border); border-radius:2px; color:var(--accent); }

        /* ─── STATUS BAR ─── */
        .status-bar {
            height: 24px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 20px;
            flex-shrink: 0;
            font-size: 10px;
            color: var(--text-dim);
        }
        .status-bar .indicator {
            display:flex; align-items:center; gap:4px;
        }
        .status-bar .dot { width:5px; height:5px; border-radius:50%; }
    </style>
</head>

const SCHEDULED = [
    { name:'SCOUT Pipeline Sweep', cron:'Daily 6:00 AM', status:'on' },
    { name:'SARAH File Sweep', cron:'Every 4 hours', status:'on' },
    { name:'ATLAS Dependency Check', cron:'Daily 8:00 AM', status:'on' },
    { name:'Resy Reservation Monitor', cron:'Every 30 min', status:'on' },
    { name:'Dashboard Auto-Deploy', cron:'On git push', status:'off' },
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let selectedProject = 'sharpie';
let selectedTab = 'activity';

// ═══════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════
function renderAgents() {
    const el = document.getElementById('agent-list');
    el.innerHTML = AGENTS.map(a => `
        <div class="agent-item" onclick="openAgent('${a.id}')">
            <div class="agent-dot ${a.status}"></div>
            <div class="agent-info">
                <div class="name">${a.name}</div>
                <div class="role">${a.role}</div>
            </div>
            <div class="agent-tasks">${a.tasks > 0 ? a.tasks : '—'}</div>
        </div>
    `).join('');
}

function renderProjects() {
    const el = document.getElementById('projects-bar');
    el.innerHTML = PROJECTS.map(p => {
        const dotColor = p.status==='active'?'var(--green)':p.status==='complete'?'var(--blue)':'var(--amber)';
        return `
        <div class="proj-card ${p.id===selectedProject?'selected':''}" onclick="selectProject('${p.id}')">
            <div class="proj-name"><span class="proj-status-dot" style="background:${dotColor};${p.status==='active'?'box-shadow:0 0 5px rgba(76,175,80,0.5)':''}"></span>${p.name}</div>
            <div class="proj-desc">${p.desc}</div>
            <div class="proj-date">${p.date}</div>
        </div>`;
    }).join('');
}

function renderDetail() {
    const proj = PROJECTS.find(p=>p.id===selectedProject);
    if (!proj) return;

    // Activity
    document.getElementById('pane-activity').innerHTML = proj.activity.map(a => `
        <div class="feed-item" onclick="openActivity('${a.agent}','${a.text.replace(/'/g,"\\'")}')">
            <div class="feed-agent">${a.agent}</div>
            <div class="feed-text">${a.text}</div>
            <div class="feed-time">${a.time}</div>
        </div>
    `).join('') || '<div style="color:var(--text-dim);padding:20px;text-align:center;">No recent activity</div>';

    // Files
    document.getElementById('pane-files').innerHTML = proj.files.map(f => {
        const ext = f.split('.').pop();
        const icon = ext==='md'?'📄':ext==='html'?'🌐':ext==='json'?'📊':'📁';
        return `
        <div class="file-item" onclick="openFile('${f}')">
            <div class="file-icon">${icon}</div>
            <div class="file-name">${f}</div>
        </div>`;
    }).join('');

    // Metrics
    const m = proj.metrics;
    const cards = Object.entries(m).map(([k,v]) => `
        <div class="metric-card">
            <div class="metric-val">${v}</div>
            <div class="metric-lbl">${k.replace(/([A-Z])/g,' $1').trim()}</div>
        </div>
    `).join('');
    document.getElementById('pane-metrics').innerHTML = `<div class="metrics-grid">${cards}</div>`;
}

function renderPipeline() {
    const el = document.getElementById('pipeline-list');
    el.innerHTML = PIPELINE.map(p => {
        const cls = p.stage==='hot'?'badge-hot':p.stage==='warm'?'badge-warm':p.stage==='overdue'?'badge-overdue':'badge-cold';
        return `
        <div class="pipeline-item" onclick="openProspect('${p.name.replace(/'/g,"\\'")}')">
            <div class="pipeline-info">
                <div class="name">${p.name}</div>
                <div class="detail">${p.contact} — ${p.detail}</div>
            </div>
            <span class="badge ${cls}">${p.stage}</span>
        </div>`;
    }).join('');
}

function renderScheduled() {
    const el = document.getElementById('sched-list');
    el.innerHTML = SCHEDULED.map(s => `
        <div class="sched-item" onclick="openTask('${s.name.replace(/'/g,"\\'")}')">
            <div class="sched-dot ${s.status}"></div>
            <div class="sched-info">
                <div class="name">${s.name}</div>
                <div class="cron">${s.cron}</div>
            </div>
        </div>
    `).join('');
}

// ═══════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════
function selectProject(id) {
    selectedProject = id;
    renderProjects();
    renderDetail();
}

function selectTab(tab) {
    selectedTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id==='pane-'+tab));
}

function openModal(title, html) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
}

function openAgent(id) {
    const a = AGENTS.find(x=>x.id===id);
    if (!a) return;
    openModal(a.name + ' — ' + a.role, `
        <div class="kv"><span class="k">Status</span><span class="v" style="color:${a.status==='active'?'var(--green)':a.status==='busy'?'var(--amber)':'var(--text-dim)'}">${a.status.toUpperCase()}</span></div>
        <div class="kv"><span class="k">Tasks completed</span><span class="v">${a.tasks}</span></div>
        <h3>Last Action</h3>
        <p>${a.lastAction}</p>
        <h3>Capabilities</h3>
        <div class="tag-row">
            ${getAgentTags(a.id)}
        </div>
    `);
}

function getAgentTags(id) {
    const tags = {
        jarvis: ['orchestration','task-routing','agent-coordination','decision-making'],
        maestro: ['strategy','creative-direction','brand-architecture','film-treatment'],
        writer: ['copywriting','scripts','manifesto','VO','deck-copy'],
        scout: ['market-research','prospect-intel','competitor-analysis','trend-detection'],
        testing: ['creative-scoring','ipsos-methodology','demo-analysis','A/B-testing'],
        nolan: ['storyboards','visual-direction','motion','cinematography'],
        park: ['deck-building','google-slides','presentation-design','layout'],
        sarah: ['outreach','email','file-management','scheduling'],
        atlas: ['dependency-tracking','timeline-management','blocker-detection'],
        cfo: ['financial-strategy','tax-optimization','revenue-planning'],
        guardian: ['quality-control','consistency-checks','brand-compliance'],
        persona: ['audience-profiling','behavioral-data','gen-z-insights'],
    };
    return (tags[id]||[]).map(t=>`<span class="tag">${t}</span>`).join('');
}

function openProspect(name) {
    const p = PIPELINE.find(x=>x.name===name);
    if (!p) return;
    openModal(p.name, `
        <div class="kv"><span class="k">Contact</span><span class="v">${p.contact}</span></div>
        <div class="kv"><span class="k">Stage</span><span class="v">${p.stage.toUpperCase()}</span></div>
        <div class="kv"><span class="k">Detail</span><span class="v">${p.detail}</span></div>
    `);
}

function openTask(name) {
    const s = SCHEDULED.find(x=>x.name===name);
    if (!s) return;
    openModal(s.name, `
        <div class="kv"><span class="k">Schedule</span><span class="v">${s.cron}</span></div>
        <div class="kv"><span class="k">Status</span><span class="v" style="color:${s.status==='on'?'var(--green)':'var(--text-dim)'}">${s.status.toUpperCase()}</span></div>
    `);
}

function openActivity(agent, text) {
    openModal(agent + ' Activity', `<p>${text}</p>`);
}

function openFile(name) {
    openModal(name, `<p style="color:var(--text-dim)">File located in JARVIS output directory.</p><p style="margin-top:8px;color:var(--text);">output/sharpie-what-you-make-it/${name}</p>`);
}

// ═══════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════
function updateClock() {
    const now = new Date();
    const opts = { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false };
    document.getElementById('clock').textContent = now.toLocaleDateString('en-US', opts).replace(',','');
}

// ═══════════════════════════════════════
// PARTICLE GLOBE
// ═══════════════════════════════════════
function initGlobe() {
    const canvas = document.getElementById('globe-canvas');
    const wrap = canvas.parentElement;
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
    camera.position.z = 3.2;

    // Globe particles
    const geo = new THREE.BufferGeometry();
    const count = 4000;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        const phi = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        const r = 1.0;
        positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i*3+2] = r * Math.cos(phi);

        // Color: cyan-ish with some variation
        const bright = 0.3 + Math.random() * 0.7;
        colors[i*3] = 0.0 * bright;
        colors[i*3+1] = 0.7 * bright;
        colors[i*3+2] = 0.85 * bright;
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({
        size: 0.012,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true,
    });
    const globe = new THREE.Points(geo, mat);
    scene.add(globe);

    // Ring particles (orbit)
    const ringGeo = new THREE.BufferGeometry();
    const ringCount = 800;
    const ringPos = new Float32Array(ringCount * 3);
    const ringCol = new Float32Array(ringCount * 3);
    for (let i = 0; i < ringCount; i++) {
        const angle = (i / ringCount) * Math.PI * 2;
        const r = 1.3 + (Math.random() - 0.5) * 0.06;
        ringPos[i*3] = r * Math.cos(angle);
        ringPos[i*3+1] = (Math.random() - 0.5) * 0.04;
        ringPos[i*3+2] = r * Math.sin(angle);
        ringCol[i*3] = 0.0;
        ringCol[i*3+1] = 0.5 + Math.random()*0.3;
        ringCol[i*3+2] = 0.7 + Math.random()*0.15;
    }
    ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
    ringGeo.setAttribute('color', new THREE.BufferAttribute(ringCol, 3));
    const ringMat = new THREE.PointsMaterial({ size:0.008, vertexColors:true, transparent:true, opacity:0.5, sizeAttenuation:true });
    const ring = new THREE.Points(ringGeo, ringMat);
    ring.rotation.x = 0.5;
    scene.add(ring);

    // Connection lines (subtle)
    const lineMat = new THREE.LineBasicMaterial({ color:0x00B4D8, transparent:true, opacity:0.06 });
    for (let i = 0; i < 20; i++) {
        const lineGeo = new THREE.BufferGeometry();
        const i1 = Math.floor(Math.random()*count);
        const i2 = Math.floor(Math.random()*count);
        lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
            positions[i1*3], positions[i1*3+1], positions[i1*3+2],
            positions[i2*3], positions[i2*3+1], positions[i2*3+2],
        ]), 3));
        scene.add(new THREE.Line(lineGeo, lineMat));
    }

    // Animate
    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += 0.002;
        ring.rotation.y -= 0.001;
        renderer.render(scene, camera);
    }
    animate();

    // Resize
    window.addEventListener('resize', () => {
        const nw = wrap.clientWidth;
        const nh = wrap.clientHeight;
        camera.aspect = nw/nh;
        camera.updateProjectionMatrix();
        renderer.setSize(nw, nh);
    });
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    renderAgents();
    renderProjects();
    renderDetail();
    renderPipeline();
    renderScheduled();
    updateClock();
    setInterval(updateClock, 1000);
    initGlobe();

    // Tab clicks
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => selectTab(t.dataset.tab));
    });

    // Modal close
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
});
</script>
</body>
</html>
