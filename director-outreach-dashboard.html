<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIRECTOR HUB — Rick Wayne</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060e1a;--panel:#0a1628;--card:#0d1b2e;--border:#1a2a44;--accent:#00B4D8;--accent2:#0077B6;--green:#10B981;--yellow:#F59E0B;--red:#EF4444;--orange:#F97316;--purple:#a78bfa;--text:#e2e8f0;--muted:#64748b;--dim:#334155}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ─── TOP BAR ─── */
.top-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:13px;letter-spacing:3px;color:var(--accent);font-weight:600}
.top-bar .meta{font-size:12px;color:var(--muted);display:flex;gap:16px;align-items:center}
.top-bar .meta b{color:var(--green)}

/* ─── TABS ─── */
.tab-bar{background:var(--panel);border-bottom:1px solid var(--border);display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:12px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:12px;letter-spacing:1.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--text);background:rgba(0,180,216,.04)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,180,216,.06)}
.tab-panel{display:none;min-height:calc(100vh - 96px)}
.tab-panel.active{display:block}

/* ─── PLAYBOOK TAB (sidebar + content) ─── */
.playbook-layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 96px)}
.sidebar{background:var(--panel);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto}
.sidebar h3{font-size:10px;letter-spacing:2px;color:var(--muted);padding:8px 16px;margin-top:12px}
.sidebar h3:first-child{margin-top:0}
.week-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;background:none;border:none;color:var(--text);font-size:13px;cursor:pointer;text-align:left;transition:background .2s}
.week-btn:hover{background:rgba(0,180,216,.08)}
.week-btn.active{background:rgba(0,180,216,.12);border-left:2px solid var(--accent)}
.week-btn .wk-prog{font-size:11px;color:var(--muted);margin-left:auto}
.week-btn .wk-prog.done{color:var(--green)}
.day-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 16px 8px 28px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-align:left;transition:all .2s}
.day-btn:hover{color:var(--text);background:rgba(0,180,216,.05)}
.day-btn.active{color:var(--accent);background:rgba(0,180,216,.08)}
.day-btn.completed{color:var(--green)}
.day-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
.day-btn.completed .dot{background:var(--green)}
.day-btn.active .dot{background:var(--accent)}
.pb-content{padding:32px;max-width:840px;overflow-y:auto}
.progress-strip{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:16px;align-items:center}
.progress-strip .label{font-size:12px;color:var(--muted);white-space:nowrap}
.progress-strip .label b{color:var(--text)}
.pbar{flex:1;height:6px;background:var(--dim);border-radius:3px;overflow:hidden}
.pbar .fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .4s}

/* ─── TASK CARDS ─── */
.day-header{margin-bottom:24px}
.day-header h2{font-size:22px;font-weight:600;margin-bottom:4px}
.day-header .sub{font-size:13px;color:var(--muted)}
.day-header .theme{display:inline-block;margin-top:8px;padding:4px 10px;border-radius:4px;font-size:11px;letter-spacing:1px;font-weight:600}
.theme.connect{background:rgba(0,180,216,.15);color:var(--accent)}
.theme.post{background:rgba(249,115,22,.15);color:var(--orange)}
.theme.engage{background:rgba(16,185,129,.15);color:var(--green)}
.theme.research{background:rgba(139,92,246,.15);color:var(--purple)}
.task-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;transition:border-color .2s}
.task-card.checked{border-color:var(--green);opacity:.7}
.task-card.checked .task-title{text-decoration:line-through;color:var(--muted)}
.task-top{display:flex;align-items:flex-start;gap:12px}
.task-check{width:20px;height:20px;border:2px solid var(--dim);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.task-check:hover{border-color:var(--accent)}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done::after{content:'\2713';color:#fff;font-size:12px;font-weight:700}
.task-title{font-size:14px;font-weight:600;margin-bottom:4px}
.task-desc{font-size:13px;color:var(--muted);line-height:1.5}
.copy-block{background:rgba(0,180,216,.06);border:1px solid rgba(0,180,216,.15);border-radius:6px;padding:12px;margin-top:10px;position:relative}
.copy-block p{font-size:13px;line-height:1.6;color:var(--text);font-style:italic}
.copy-block .copy-btn{position:absolute;top:8px;right:8px;background:var(--accent2);color:#fff;border:none;padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer;letter-spacing:1px}
.copy-block .copy-btn:hover{background:var(--accent)}
.copy-block .target{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:6px;font-style:normal}
.tip{background:rgba(249,115,22,.06);border-left:3px solid var(--orange);padding:10px 12px;margin-top:10px;border-radius:0 6px 6px 0}
.tip p{font-size:12px;color:var(--muted);line-height:1.5}
.tip b{color:var(--orange)}
.next-day-banner{text-align:center;padding:24px;margin-top:16px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px}
.next-day-banner .check{font-size:24px;margin-bottom:8px}
.next-day-banner .msg{font-size:14px;font-weight:600;color:var(--green);margin-bottom:8px}
.next-day-banner button{background:var(--green);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}

/* ─── TARGET DATABASE TAB ─── */
.db-wrap{padding:32px;max-width:1100px;margin:0 auto}
.db-controls{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.db-search{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-size:13px;flex:1;min-width:200px;outline:none}
.db-search:focus{border-color:var(--accent)}
.db-search::placeholder{color:var(--dim)}
.filter-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 14px;color:var(--muted);font-size:12px;cursor:pointer;font-weight:600;letter-spacing:.5px;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:rgba(0,180,216,.1);border-color:var(--accent);color:var(--accent)}
.db-section-title{font-size:10px;letter-spacing:2px;color:var(--muted);margin:28px 0 12px;font-weight:600}
.target-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:10px;transition:border-color .2s}
.target-card:hover{border-color:var(--accent2)}
.tc-top{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.tc-name{font-size:15px;font-weight:700}
.tc-role{font-size:12px;color:var(--muted)}
.tier-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:1px}
.tier-badge.sweet{background:rgba(16,185,129,.2);color:var(--green)}

/* ─── LINKEDIN ADDS ─── */
.tc-li-adds{margin-top:10px;padding:10px 12px;background:rgba(0,119,182,.06);border:1px solid rgba(0,119,182,.15);border-radius:6px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.li-adds-label{font-size:9px;letter-spacing:1.5px;color:var(--accent2);font-weight:700;margin-right:4px;white-space:nowrap}
.li-add-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(0,180,216,.08);border:1px solid rgba(0,180,216,.12);border-radius:4px;padding:4px 10px;font-size:12px;color:var(--text);font-weight:600;transition:all .2s}
.li-add-chip.added{opacity:.55;border-color:var(--green);background:rgba(16,185,129,.08)}
.li-add-chip.added .li-add-name{text-decoration:line-through;color:var(--muted)}
.li-add-chip .li-add-title{font-weight:400;color:var(--muted);font-size:11px}
.li-add-check{width:14px;height:14px;border:2px solid var(--dim);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.li-add-check:hover{border-color:var(--accent)}
.li-add-check.done{background:var(--green);border-color:var(--green)}
.li-add-check.done::after{content:'\2713';color:#fff;font-size:9px;font-weight:700}
.li-add-link{color:var(--accent);font-size:11px;text-decoration:none;margin-left:2px;opacity:.7;transition:opacity .2s}
.li-add-link:hover{opacity:1;text-decoration:underline}
.tier-badge.build{background:rgba(249,115,22,.2);color:var(--orange)}
.tier-badge.agency{background:rgba(167,139,250,.2);color:var(--purple)}
.tier-badge.media{background:rgba(100,116,139,.2);color:var(--muted)}
.tc-why{font-size:13px;color:var(--muted);line-height:1.5;margin-top:6px}
.tc-hook{background:rgba(0,180,216,.06);border:1px solid rgba(0,180,216,.12);border-radius:6px;padding:10px 12px;margin-top:8px;position:relative}
.tc-hook p{font-size:12px;line-height:1.5;color:var(--text);font-style:italic}
.tc-hook .copy-btn{position:absolute;top:6px;right:6px;background:var(--accent2);color:#fff;border:none;padding:3px 7px;border-radius:4px;font-size:9px;cursor:pointer;letter-spacing:1px}
.tc-links{display:flex;gap:12px;margin-top:8px;font-size:11px}
.tc-links a{color:var(--accent);font-weight:600}
.tc-recent{font-size:12px;color:var(--dim);margin-top:6px;font-style:italic}

/* ─── LINKEDIN ENGINE TAB ─── */
.li-wrap{padding:32px;max-width:860px;margin:0 auto}
.li-schedule{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:32px}
.li-week{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.li-week:hover{border-color:var(--accent2)}
.li-week.active{border-color:var(--accent);background:rgba(0,180,216,.08)}
.li-week .wnum{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:4px}
.li-week .wtitle{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.li-post-view{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:24px}
.li-post-view h3{font-size:18px;font-weight:700;margin-bottom:4px}
.li-post-view .meta{font-size:12px;color:var(--muted);margin-bottom:16px}
.li-post-view .post-body{font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.li-post-view .actions{display:flex;gap:10px;margin-top:16px}
.li-post-view .actions button{background:var(--accent2);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;letter-spacing:.5px}
.li-post-view .actions button:hover{background:var(--accent)}
.li-tips{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px}
.li-tips h3{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px}
.li-tips p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:8px}

/* ─── SUBMISSIONS TAB ─── */
.sub-wrap{padding:32px;max-width:960px;margin:0 auto}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:32px}
.sub-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;transition:border-color .2s}
.sub-card:hover{border-color:var(--accent2)}
.sub-card h4{font-size:14px;font-weight:700;margin-bottom:4px}
.sub-card .sub-type{font-size:10px;letter-spacing:1.5px;color:var(--accent);font-weight:600;margin-bottom:8px}
.sub-card .sub-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.sub-card .sub-deadline{font-size:12px;font-weight:600}
.sub-card .sub-deadline.urgent{color:var(--red)}
.sub-card .sub-deadline.soon{color:var(--yellow)}
.sub-card .sub-deadline.future{color:var(--green)}
.sub-card .countdown{font-size:11px;color:var(--dim);margin-top:2px}
.events-section{margin-top:32px}
.event-row{display:flex;align-items:center;gap:16px;padding:14px 16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.event-date{font-size:12px;font-weight:700;color:var(--accent);min-width:100px}
.event-name{font-size:14px;font-weight:600;flex:1}
.event-loc{font-size:12px;color:var(--muted)}
.event-countdown{font-size:11px;color:var(--dim);min-width:80px;text-align:right}
.pub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-top:16px}
.pub-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px}
.pub-card h4{font-size:13px;font-weight:600;margin-bottom:2px}
.pub-card .pub-feature{font-size:12px;color:var(--accent);margin-bottom:4px}
.pub-card .pub-note{font-size:12px;color:var(--muted);line-height:1.4}

/* ─── STRATEGY TAB ─── */
.strat-wrap{padding:32px;max-width:900px;margin:0 auto}
.strat-panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:20px}
.strat-panel h3{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:10px}
.strat-panel p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:8px}
.strat-panel p:last-child{margin-bottom:0}
.strat-panel .highlight{color:var(--text);font-weight:600}
.strat-section{font-size:10px;letter-spacing:2px;color:var(--muted);margin:32px 0 12px;font-weight:600}
.director-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px}
.director-card h4{font-size:14px;font-weight:600;margin-bottom:2px}
.director-card .url{font-size:11px;color:var(--accent);margin-bottom:6px}
.director-card .insight{font-size:12px;color:var(--muted);line-height:1.5}
.rec-list{list-style:none;padding:0}
.rec-list li{font-size:13px;color:var(--muted);line-height:1.6;padding:6px 0;border-bottom:1px solid var(--border)}
.rec-list li:last-child{border-bottom:none}
.rec-list li strong{color:var(--text)}
.rep-panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px}
.rep-panel h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.rep-panel p{font-size:12px;color:var(--muted);line-height:1.5}

/* ─── RESET ─── */
.reset-btn{background:none;border:1px solid var(--dim);color:var(--muted);padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;letter-spacing:1px}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .playbook-layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .pb-content{padding:16px}
  .db-wrap,.li-wrap,.sub-wrap,.strat-wrap{padding:16px}
  .li-schedule{grid-template-columns:repeat(3,1fr)}
  .tab-btn{padding:10px 14px;font-size:11px}
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>DIRECTOR HUB</h1>
  <div class="meta">
    <span>Streak: <b id="streakCount">0</b> days</span>
    <button class="reset-btn" onclick="resetAll()">RESET</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('playbook')">DAILY PLAYBOOK</button>
  <button class="tab-btn" onclick="switchTab('targets')">TARGET DATABASE</button>
  <button class="tab-btn" onclick="switchTab('linkedin')">LINKEDIN ENGINE</button>
  <button class="tab-btn" onclick="switchTab('submissions')">SUBMISSIONS & EVENTS</button>
  <button class="tab-btn" onclick="switchTab('strategy')">STRATEGY</button>
</div>

<!-- ════════════════════════════════════════════════════ -->
<!-- TAB 1: DAILY PLAYBOOK                               -->
<!-- ════════════════════════════════════════════════════ -->
<div class="tab-panel active" id="panel-playbook">
  <div class="progress-strip">
    <span class="label">Week <b id="curWeek">1</b> of 6</span>
    <div class="pbar"><div class="fill" id="totalProgress" style="width:0%"></div></div>
    <span class="label"><b id="totalPct">0</b>%</span>
  </div>
  <div class="playbook-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="pb-content" id="pbContent"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════ -->
<!-- TAB 2: TARGET DATABASE                              -->
<!-- ════════════════════════════════════════════════════ -->
<div class="tab-panel" id="panel-targets">
  <div class="db-wrap" id="dbWrap"></div>
</div>

<!-- ════════════════════════════════════════════════════ -->
<!-- TAB 3: LINKEDIN ENGINE                              -->
<!-- ════════════════════════════════════════════════════ -->
<div class="tab-panel" id="panel-linkedin">
  <div class="li-wrap" id="liWrap"></div>
</div>

<!-- ════════════════════════════════════════════════════ -->
<!-- TAB 4: SUBMISSIONS & EVENTS                         -->
<!-- ════════════════════════════════════════════════════ -->
<div class="tab-panel" id="panel-submissions">
  <div class="sub-wrap" id="subWrap"></div>
</div>

<!-- ════════════════════════════════════════════════════ -->
<!-- TAB 5: STRATEGY                                     -->
<!-- ════════════════════════════════════════════════════ -->
<div class="tab-panel" id="panel-strategy">
  <div class="strat-wrap" id="stratWrap"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA

const DATA = buildData();

function buildData() {
  // ─── SWEET SPOT ───
  const sweetSpot = [
    { name:'M SS NG P ECES', person:'Ari Kuschnir', title:'Founder & Managing Partner', loc:'Brooklyn', why:'Brooklyn-based. Culture-first DNA. Founder calls himself a "New Wave Storyteller." Emphasis on immersive experiences that inspire culture is a direct mirror of your philosophy. Spiritual home.', hook:'M SS NG P ECES has been on my radar since day one \u2014 the intersection of culture and craft you\'ve built is exactly where I live.', social:'IG @mssngpeces | mssngpeces.com', recent:'Webby PCOTY (2025). Ten consecutive Ad Age A-List years. Three Emmys. Recent signings: Thuan Tran, Rebeca Huntt.', li:'linkedin.com/company/mssngpeces', linkedinAdds:[{n:'Rebecca Davis',t:'Executive Producer'},{n:'Vicky Illk',t:'Head of Production, Live Action'},{n:'Alex Curran',t:'Head of Immersive Production'}] },
    { name:'Doomsday Entertainment', person:'Danielle Hinde', title:'Founder & Owner', loc:'LA', why:'Nurtured Hiro Murai from zero. Non-risk-averse philosophy. Grammy-winning work ("This Is America"). Your entrepreneurial spirit aligns with disruption-first approach.', hook:'The way you built Doomsday \u2014 and Hiro\'s career \u2014 resonates with me. I directed for 15 years before going agency-side, and now I\'m bringing both lenses back to the work. Your taste is rare.', social:'IG @doomsdayent | doomsdayent.com', recent:'Atlas Acopian joined roster. Danielle Hinde Head Judge for shots New Director category.', li:'linkedin.com/company/doomsday-entertainment', linkedinAdds:[{n:'Jason Cole',t:'Executive Producer'}] },

  const posts = [
    { week:1, title:'The One-Sentence Brief', schedule:'Week 1, Wednesday 8\u20139AM EST', content:'The best brief I ever got was one sentence long.\n\n"Make them feel like they\'re already late."\n\nThat was it. No brand pyramid. No competitive landscape. No "key consumer insight" pulled from a deck that took six weeks to build. One sentence. And it unlocked everything \u2014 the casting, the pace, the grade, the music.\n\nThe problem with most briefs isn\'t that they\'re bad. It\'s that they\'re afraid of silence. They fill every inch of space so nobody has to make a real decision. But a director needs room to think. A sentence gives you room. A 40-page deck gives you a cage.\n\nIf you can\'t say it in one breath, you don\'t know what you want yet.' },
    { week:2, title:'Shooting Like Indie Films', schedule:'Week 2, Tuesday 8\u20139AM EST', content:'I shoot commercials like indie films and people act like that\'s a flex. It\'s not. It\'s just the only way I know how to make something that doesn\'t feel disposable.\n\nWhen you light a scene like it matters \u2014 when you let a moment breathe instead of cutting away because someone\'s nervous about holding a shot \u2014 you\'re telling the audience: this is worth your time.\n\nMost spots don\'t do that. They move fast because they have nothing to say slowly. Speed is the disguise.\n\nI\'d rather make a :30 that sits with you for a week than a :60 you forget before your thumb hits the next post.' },
    { week:3, title:'The Lunchbox Rule', schedule:'Week 3, Tuesday 8\u20139AM EST', content:'I call it the lunchbox rule.\n\nWhen I was a kid my mom packed lunch with the same care whether it was Monday or Friday. Same napkin folded the same way. She wasn\'t performing. She just didn\'t know how to half-ass it.\n\nThat\'s how I think about campaigns. Frame 47 of the cutdown for paid social should feel like it was shot by the same person who lit the hero spot. Not because anyone\'s checking. Because the work knows when you stopped caring.\n\nAudiences can\'t always articulate why something feels cheap. But they feel it. Every time.' },
    { week:4, title:'The Reverse Path', schedule:'Week 4, Tuesday 8\u20139AM EST', content:'Most ECDs dream about directing. I did it in reverse.\n\nI directed for over a decade before I ever sat in a strategy room. And when I finally did \u2014 when I saw briefs get written, watched ideas get sanded down in rounds, sat through the meetings where the client got scared \u2014 I understood why so much work dies between the deck and the set.\n\nThe translation layer is where everything breaks. The brief says one thing. The treatment says another. The director interprets a third. By the time it hits the edit, nobody remembers what the idea actually was.\n\nI remember. Because I\'ve been on every side of that table. That\'s not a career path. That\'s a competitive advantage nobody else has.' },
    { week:5, title:'The Gen Z Listening Gap', schedule:'Week 5, Tuesday 8\u20139AM EST', content:'Everyone wants to "speak to Gen Z" and almost nobody wants to listen to them first.\n\nI was on a call last month where someone described their target as "authenticity-driven digital natives." That\'s not a person. That\'s a horoscope. You could tape that to any demo born after 1996 and nod your head.\n\nThe kids I cast \u2014 the ones who make a frame come alive \u2014 they\'re not performing authenticity. They\'re just not afraid of silence. They\'ll hold a look. They\'ll let a joke land without mugging. They trust the viewer.\n\nMaybe the brief shouldn\'t be "speak to Gen Z." Maybe it should be "have the confidence Gen Z already has."' },
    { week:6, title:'Content vs. Filmmaking', schedule:'Week 6, Tuesday 8\u20139AM EST', content:'There\'s a difference between content and filmmaking and it\'s not budget.\n\nContent fills space. Filmmaking holds it. You can feel the difference in the first two seconds \u2014 before a single word is spoken, before the logo, before the super. Something in the frame either has a point of view or it doesn\'t.\n\nI\'ve seen $15K shoots with more intention than $2M productions. Money doesn\'t buy taste. It doesn\'t buy restraint. And it definitely doesn\'t buy the instinct to know when a frame is done \u2014 when adding one more thing would break it.\n\nThe best work I\'ve made cost the least. Not because scrappy is romantic. Because constraints force clarity.' },
  ];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let state = loadState();
let currentWeek = 0, currentDay = 0, currentTab = 'playbook', currentPost = 0;
let dbFilter = 'all', dbSearch = '';

function loadState() { try { return JSON.parse(localStorage.getItem('directorHubV2') || '{}'); } catch { return {}; } }
function saveState() { localStorage.setItem('directorHubV2', JSON.stringify(state)); }
function resetAll() { if(confirm('Reset all progress? Cannot be undone.')) { state={}; saveState(); render(); } }

function getTaskKey(w,d,t) { return 'w'+w+'d'+d+'t'+t; }
function isChecked(w,d,t) { return !!state[getTaskKey(w,d,t)]; }
function toggleTask(w,d,t) { const k=getTaskKey(w,d,t); state[k]=!state[k]; saveState(); render(); }

function toggleLiAdd(key) { if(!state.liAdds) state.liAdds={}; state.liAdds[key]=!state.liAdds[key]; saveState(); renderTargets(); }

function getDayComp(w,d) { const day=DATA.weeks[w].days[d]; let tot=day.tasks.length,done=day.tasks.filter((_,t)=>isChecked(w,d,t)).length; return {tot,done,pct:tot?Math.round(done/tot*100):0}; }
function getWeekComp(w) { let tot=0,done=0; DATA.weeks[w].days.forEach((day,d)=>{ day.tasks.forEach((_,t)=>{ tot++; if(isChecked(w,d,t)) done++; }); }); return {tot,done,pct:tot?Math.round(done/tot*100):0}; }
function getTotalComp() { let tot=0,done=0; DATA.weeks.forEach((wk,w)=>{ wk.days.forEach((day,d)=>{ day.tasks.forEach((_,t)=>{ tot++; if(isChecked(w,d,t)) done++; }); }); }); return {tot,done,pct:tot?Math.round(done/tot*100):0}; }
function getStreak() { let s=0; for(let w=0;w<DATA.weeks.length;w++) for(let d=0;d<DATA.weeks[w].days.length;d++) { if(getDayComp(w,d).pct===100) s++; else return s; } return s; }


// ═══════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['playbook','targets','linkedin','submissions','strategy'];
    b.classList.toggle('active', tabs[i]===tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  render();
}


// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  document.getElementById('streakCount').textContent = getStreak();
  if (currentTab==='playbook') renderPlaybook();
  else if (currentTab==='targets') renderTargets();
  else if (currentTab==='linkedin') renderLinkedIn();
  else if (currentTab==='submissions') renderSubmissions();
  else if (currentTab==='strategy') renderStrategy();
}

// ─── PLAYBOOK ───
function renderPlaybook() {
  const total = getTotalComp();
  document.getElementById('totalProgress').style.width = total.pct+'%';
  document.getElementById('totalPct').textContent = total.pct;
  document.getElementById('curWeek').textContent = currentWeek+1;
  renderSidebar();
  renderPbContent();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let h = '<h3>6-WEEK PLAN</h3>';
  DATA.weeks.forEach((wk,w) => {
    const c = getWeekComp(w);
    h += '<button class="week-btn '+(currentWeek===w?'active':'')+'" onclick="selectWeek('+w+')">'+wk.name+' <span style="color:var(--muted);font-size:11px">\u2014 '+wk.subtitle+'</span><span class="wk-prog '+(c.pct===100?'done':'')+'">'+c.pct+'%</span></button>';
    if (currentWeek===w) {
      wk.days.forEach((day,d) => {
        const dc = getDayComp(w,d);
        h += '<button class="day-btn '+(currentDay===d?'active':'')+' '+(dc.pct===100?'completed':'')+'" onclick="selectDay('+w+','+d+')"><span class="dot"></span>'+day.name+' <span style="margin-left:auto;font-size:10px">'+dc.done+'/'+dc.tot+'</span></button>';
      });
    }
  });
  sb.innerHTML = h;
}

function renderPbContent() {
  const ct = document.getElementById('pbContent');
  const wk = DATA.weeks[currentWeek], day = wk.days[currentDay];
  let h = '<div class="day-header"><h2>'+wk.name+', '+day.name+'</h2><div class="sub">'+wk.subtitle+'</div><span class="theme '+day.theme+'">'+day.themeLabel+'</span></div>';
  day.tasks.forEach((task,t) => {
    const chk = isChecked(currentWeek,currentDay,t);
    h += '<div class="task-card '+(chk?'checked':'')+'"><div class="task-top"><div class="task-check '+(chk?'done':'')+'" onclick="toggleTask('+currentWeek+','+currentDay+','+t+')"></div><div style="flex:1"><div class="task-title">'+task.title+'</div>';
    if(task.desc) h += '<div class="task-desc">'+task.desc+'</div>';
    if(task.copy) h += '<div class="copy-block">'+(task.target?'<div class="target">'+task.target+'</div>':'')+'<p>'+task.copy.replace(/\n/g,'<br>')+'</p><button class="copy-btn" onclick="copyText(this,`'+task.copy.replace(/`/g,'\\`').replace(/\\/g,'\\\\')+'`)">COPY</button></div>';
    if(task.tip) h += '<div class="tip"><p><b>Tip:</b> '+task.tip+'</p></div>';
    h += '</div></div></div>';
  });
  const comp = getDayComp(currentWeek,currentDay);
  if (comp.pct===100) {
    const hasNext = currentDay<wk.days.length-1 || currentWeek<DATA.weeks.length-1;
    if(hasNext) h += '<div class="next-day-banner"><div class="check">\u2713</div><div class="msg">Day complete.</div><button onclick="goNext()">Move to next day \u2192</button></div>';
  }
  ct.innerHTML = h;
}

function selectWeek(w) { currentWeek=w; currentDay=0; render(); }
function selectDay(w,d) { currentWeek=w; currentDay=d; render(); }
function goNext() { const wk=DATA.weeks[currentWeek]; if(currentDay<wk.days.length-1) currentDay++; else if(currentWeek<DATA.weeks.length-1){currentWeek++;currentDay=0;} render(); }


// ─── TARGET DATABASE ───
function renderTargets() {
  const wrap = document.getElementById('dbWrap');
  let h = '<div class="db-controls"><input class="db-search" placeholder="Search targets..." oninput="dbSearch=this.value;renderTargets()" value="'+dbSearch+'">';
  ['all','sweet','build','long','agency','media'].forEach(f => {
    const labels = {all:'ALL',sweet:'SWEET SPOT',build:'BUILD REL',long:'LONG GAME',agency:'AGENCY',media:'MEDIA'};
    h += '<button class="filter-btn '+(dbFilter===f?'active':'')+'" onclick="dbFilter=\''+f+'\';renderTargets()">'+labels[f]+'</button>';
  });
  h += '</div>';

  const q = dbSearch.toLowerCase();
  function matchQ(card) { if(!q) return true; let s = card.name+' '+(card.person||'')+' '+(card.agency||'')+' '+(card.title||'')+' '+(card.why||'')+' '+(card.note||'')+' '+(card.platform||''); if(card.linkedinAdds) card.linkedinAdds.forEach(a => s += ' '+a.n+' '+a.t); return s.toLowerCase().includes(q); }

  if (dbFilter==='all'||dbFilter==='sweet') {
    const items = DATA.sweetSpot.filter(matchQ);
    if(items.length) { h += '<div class="db-section-title">SWEET SPOT \u2014 WHERE YOU WIN</div>'; items.forEach(c => h += targetCard(c,'sweet','prodco')); }
  }
  if (dbFilter==='all'||dbFilter==='build') {
    const items = DATA.buildRel.filter(matchQ);
    if(items.length) { h += '<div class="db-section-title">BUILD RELATIONSHIP \u2014 CONVERT LATER</div>'; items.forEach(c => h += targetCard(c,'build','prodco')); }
  }
  if (dbFilter==='all'||dbFilter==='long') {
    const items = DATA.longGame.filter(matchQ);
    if(items.length) { h += '<div class="db-section-title">LONG GAME \u2014 ASPIRATIONAL</div>'; items.forEach(c => h += targetCard(c,'long','prodco')); }
  }
  if (dbFilter==='all'||dbFilter==='agency') {
    const items = DATA.agencyTargets.filter(matchQ);
    if(items.length) { h += '<div class="db-section-title">AGENCY HEADS OF PRODUCTION</div>'; items.forEach(a => h += agencyCard(a)); }
  }
  if (dbFilter==='all'||dbFilter==='media') {
    const items = DATA.industryMedia.filter(matchQ);
    if(items.length) { h += '<div class="db-section-title">INDUSTRY MEDIA</div>'; items.forEach(m => h += mediaCard(m)); }
  }
  wrap.innerHTML = h;
}

function targetCard(c, tier) {
  let h = '<div class="target-card"><div class="tc-top"><span class="tc-name">'+c.name+'</span><span class="tier-badge '+tier+'">'+(tier==='sweet'?'SWEET SPOT':tier==='build'?'BUILD REL':'LONG GAME')+'</span></div>';
  h += '<div class="tc-role">'+c.person+' \u2014 '+c.title+(c.loc?' \u00b7 '+c.loc:'')+'</div>';
  h += '<div class="tc-why">'+c.why+'</div>';
  if(c.hook) h += '<div class="tc-hook"><p>'+c.hook+'</p><button class="copy-btn" onclick="copyText(this,`'+c.hook.replace(/`/g,'\\`').replace(/\\/g,'\\\\')+'`)">COPY</button></div>';
  if(c.recent) h += '<div class="tc-recent">'+c.recent+'</div>';
  if(c.linkedinAdds && c.linkedinAdds.length) {
    h += '<div class="tc-li-adds"><span class="li-adds-label">ALSO CONNECT WITH</span>';
    c.linkedinAdds.forEach(a => {
      const key = 'liadd_'+(c.name+'_'+a.n).replace(/[^a-zA-Z0-9]/g,'_');
      const done = state.liAdds && state.liAdds[key];
      const liUrl = 'https://www.linkedin.com/search/results/people/?keywords='+encodeURIComponent(a.n+' '+c.name);
      h += '<span class="li-add-chip'+(done?' added':'')+'">';
      h += '<span class="li-add-check'+(done?' done':'')+'" onclick="toggleLiAdd(\''+key+'\')"></span>';
      h += '<a href="'+liUrl+'" target="_blank" class="li-add-name" style="color:inherit;text-decoration:none'+(done?';text-decoration:line-through;color:var(--muted)':'')+'">'+a.n+'</a>';
      h += ' <span class="li-add-title">'+a.t+'</span>';
      h += '</span>';
    });
    h += '</div>';
  }
  let links = [];
  if(c.li) links.push('<a href="https://'+c.li+'" target="_blank">LinkedIn</a>');
  if(c.social) links.push('<span style="color:var(--muted)">'+c.social+'</span>');
  if(links.length) h += '<div class="tc-links">'+links.join(' \u00b7 ')+'</div>';
  h += '</div>';
  return h;
}

function agencyCard(a) {
  let h = '<div class="target-card"><div class="tc-top"><span class="tc-name">'+a.name+'</span><span style="color:var(--muted);font-size:13px">\u2014 '+a.agency+'</span><span class="tier-badge agency">AGENCY</span>';
  if(a.priority) h += '<span class="tier-badge sweet">PRIORITY</span>';
  h += '</div><div class="tc-role">'+a.title+'</div>';
  if(a.note) h += '<div class="tc-why">'+a.note+'</div>';
  h += '<div class="tc-hook"><p>'+a.hook+'</p><button class="copy-btn" onclick="copyText(this,`'+a.hook.replace(/`/g,'\\`').replace(/\\/g,'\\\\')+'`)">COPY</button></div>';
  let links = [];
  if(a.li) links.push('<a href="https://'+a.li+'" target="_blank">LinkedIn</a>');
  if(links.length) h += '<div class="tc-links">'+links.join(' \u00b7 ')+'</div>';
  h += '</div>';
  return h;
}

function mediaCard(m) {
  return '<div class="target-card"><div class="tc-top"><span class="tc-name">'+m.name+'</span><span class="tier-badge media">MEDIA</span></div><div class="tc-role">'+m.platform+'</div><div class="tc-hook"><p>'+m.hook+'</p><button class="copy-btn" onclick="copyText(this,`'+m.hook.replace(/`/g,'\\`').replace(/\\/g,'\\\\')+'`)">COPY</button></div></div>';
}

  DATA.publications.forEach(p => {
    h += '<div class="pub-card"><h4>'+p.name+'</h4><div class="pub-feature">'+p.feature+'</div><div class="pub-note">'+p.note+'</div></div>';
  });
  h += '</div>';

  h += '<div class="strat-panel" style="margin-top:32px"><h3>Rep & Agent Landscape</h3>';
  h += '<p>Commercial directors work through <strong>production companies that maintain rosters.</strong> Unlike film/TV agencies, production companies serve as both agent AND production entity.</p>';
  h += '<p><strong>Deal structures:</strong> First-Look (must offer projects to company first), Project-to-Project (most common), Overall Deals (rare annual guarantees). Most are non-exclusive, first-call basis.</p>';
  h += '<p><strong>Top talent agencies with commercial divisions:</strong> CAA (16.2% market share, 38% of top 50 directors), WME (10.3%), UTA (9.8%).</p>';
  h += '<p><strong>Your path:</strong> Your dual fluency (15+ years directing AND deep agency strategy) is a genuine differentiator. Non-traditional directors getting signed is trending. Branded content boom, diverse voices prioritized, strategic thinking is an asset.</p>';
  h += '<p><strong>Reel:</strong> 3\u20135 strong pieces. One high-quality piece > five weak ones. Quality is non-negotiable.</p>';
  h += '</div>';

  wrap.innerHTML = h;
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text.replace(/\\n/g,'\n'));
  const orig = btn.textContent;
  btn.textContent = 'COPIED';
  setTimeout(() => btn.textContent = orig, 1500);
}
